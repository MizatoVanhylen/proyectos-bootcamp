<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- BOOTSTRAP> -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="./style.css" />

    <title>MÓDULO 2 - ACTIVIDAD AE-5</title>
  </head>

  <body>
    <header class="row justify-content-center align-items-center mb-4">
      <h1 class="fs-4 text-center">Formulario de Registro</h1>
    </header>

    <main class="data-container">
      <form class="row col-12 col-md-6" id="form">
        <div class="data-container mb-2">
          <label for="name">Nombre</label>
          <input type="text" id="name" placeholder="Ingresa tu nombre" />
          <p id="errorName" class="text-danger"></p>
        </div>

        <div class="data-container mb-2">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="ejemplo@correo.cl" />
          <p id="errorEmail" class="text-danger"></p>
        </div>

        <div class="data-container mb-3">
          <label for="age">Edad</label>
          <input type="number" id="age" placeholder="Ingresa tu edad" />
          <p id="errorAge" class="text-danger"></p>
        </div>

        <button class="btn btn-primary" id="btn" type="submit">
          Enviar
        </button>
      </form>
    </main>

    <footer class="row mt-4">
      <h6 class="col-12 text-center">Actividad AE-5 - 2025</h6>
    </footer>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- BOOTSTRAP JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="./main.js"></script>
  </body>
</html>
