<!DOCTYPE html>
<html>
  <head>
    <title>SPA Notas</title>
  </head>
  <body>
    <h1>Notas</h1>
    <ul id="notes"></ul>

    <script>
    //   fetch('/api/notes')  
      fetch('http://localhost:3000/api/notes')
        .then(res => res.json())
        .then(data => {
          const list = document.getElementById('notes');
          data.forEach(note => {
            const li = document.createElement('li');
            li.textContent = note.content;
            list.appendChild(li);
          });
        });
    </script>
  </body>
</html>
