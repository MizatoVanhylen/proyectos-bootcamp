<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Model Kit Pokémon</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="p-4">
    <h2 class="text-center mb-4">Model Kit Pokémon</h2>

    <div id="pokemonCarousel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active text-center">
          <img
            src="img/img-modelkit-charmander.avif"
            class="d-block mx-auto img-fluid"
            alt="Charmander"
          />
          <button class="btn btn-outline-primary btn-favorito mt-3">
            Agregar a Favoritos
          </button>
        </div>

        <div class="carousel-item text-center">
          <img
            src="img/img-modelkit-pikachu.avif"
            class="d-block mx-auto img-fluid"
            alt="Pikachu"
          />
          <button class="btn btn-outline-primary btn-favorito mt-3">
            Agregar a Favoritos
          </button>
        </div>

        <div class="carousel-item text-center">
          <img
            src="img/img-modelkit-eevee.avif"
            class="d-block mx-auto img-fluid"
            alt="Eevee"
          />
          <button class="btn btn-outline-primary btn-favorito mt-3">
            Agregar a Favoritos
          </button>
        </div>

        <div class="carousel-item text-center">
          <img
            src="img/img-modelkit-mew.avif"
            class="d-block mx-auto img-fluid"
            alt="Mew"
          />
          <button class="btn btn-outline-primary btn-favorito mt-3">
            Agregar a Favoritos
          </button>
        </div>

        <div class="carousel-item text-center">
          <img
            src="img/img-modelkit-bulbasaur.avif"
            class="d-block mx-auto img-fluid"
            alt="Bulbasaur"
          />
          <button class="btn btn-outline-primary btn-favorito mt-3">
            Agregar a Favoritos
          </button>
        </div>

        <div class="carousel-item text-center">
          <img
            src="img/img-modelkit-slowpoke.avif"
            class="d-block mx-auto img-fluid"
            alt="Slowpoke"
          />
          <button class="btn btn-outline-primary btn-favorito mt-3">
            Agregar a Favoritos
          </button>
        </div>

        <div class="carousel-item text-center">
          <img
            src="img/img-modelkit-squirtle.avif"
            class="d-block mx-auto img-fluid"
            alt="Squirtle"
          />
          <button class="btn btn-outline-primary btn-favorito mt-3">
            Agregar a Favoritos
          </button>
        </div>
      </div>

      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#pokemonCarousel"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#pokemonCarousel"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
